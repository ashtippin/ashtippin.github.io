<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashton Tippin</title>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, #0b1220, #020617);
            color: #e5e7eb;
            font-family: "JetBrains Mono", monospace;
        }

        .card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.15);
            backdrop-filter: blur(10px);
            padding: 42px 48px;
            border-radius: 14px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            text-align: center;
            max-width: 420px;
        }

        h1 {
            margin: 0 0 8px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        h2 {
            margin: 0 0 28px;
            font-weight: 400;
            color: #94a3b8;
            font-size: 1rem;
        }

        .links a {
            display: block;
            margin: 12px 0;
            padding: 10px 14px;
            border-radius: 8px;
            text-decoration: none;
            color: #38bdf8;
            border: 1px solid rgba(56, 189, 248, 0.25);
            transition: all 0.18s ease;
        }

        .links a:hover {
            background: rgba(56, 189, 248, 0.08);
            border-color: rgba(56, 189, 248, 0.45);
        }

        .accent {
            color: #38bdf8;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Ashton Tippin</h1>
        <h2><span class="accent">Cybersecurity Engineer</span></h2>

        <div class="links">
            <a href="https://www.linkedin.com/in/ashton-tippin/ target="_blank">
                LinkedIn
            </a>

            <a href="https:localhost" target="_blank">
                PGP Public Key
            </a>
        </div>
    </div>
</body>
</html>
